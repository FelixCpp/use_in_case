name: uic_interactor_busy_state
description: Extension for the uic_interactor package that implements a receiver/listener modifier to track whether an interactor is busy or not.
version: 1.0.0
repository: https://github.com/FelixCpp/use_in_case
publish_to: 'none'

environment:
  sdk: ^3.2.3

# Add regular dependencies here.
dependency_overrides:
  uic_interactor:
    path: ../uic-interactor/

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
